<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Погоди реч</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-zinc-900 text-white min-h-screen flex flex-col">

<!-- TOPBAR -->
<header class="h-14 bg-black flex items-center justify-between px-4 shadow-lg">

    <button onclick="toggleMenu()" class="text-2xl">
        ☰
    </button>

    <a href="../index.html" class="text-xl font-bold">
        Енигматика
    </a>

    <a href="../onama.html" class="text-sm opacity-80 hover:opacity-100">
        О нама
    </a>

</header>

<!-- SIDEBAR -->
<aside
    id="sidebar"
    class="
        fixed
        top-0
        left-[-260px]
        w-64
        h-full
        bg-zinc-800
        p-4
        text-white
        transition-all
        duration-300
        z-50
    "
>

    <h2 class="text-lg font-bold mb-4">
        Игре
    </h2>

    <nav class="flex flex-col gap-2">

        <a href="pogodi_rec.html" class="p-2 rounded hover:bg-zinc-700">
            Погоди реч
        </a>

        <a href="pogodi_grad.html" class="p-2 rounded hover:bg-zinc-700">
            Погоди град
        </a>

    </nav>

</aside>

<!-- GAME AREA -->
<main class="flex-1 flex flex-col items-center justify-center p-4">

    <h2 class="text-2xl font-bold mb-6">
        Погоди реч
    </h2>

    <!-- BOARD -->
    <div
        id="board"
        class="flex flex-col gap-2 w-full max-w-xs"
    ></div>
    <input
    id="hiddenInput"
    type="text"
    inputmode="text"
    autocomplete="off"
    autocorrect="off"
    autocapitalize="characters"
    class="opacity-0 absolute pointer-events-none"
    />

</main>

<!-- TOAST -->
<div
  id="toast"
  class="fixed bottom-6 left-1/2 -translate-x-1/2
         bg-black/80 text-white px-4 py-2 rounded-xl
         text-sm opacity-0 translate-y-4
         transition-all duration-300 pointer-events-none
         z-50"
></div>

<!-- SCRIPTS -->
<script src="../js/layout.js"></script>
<script src="../js/pogodi_rec.js"></script>

</body>
</html>
