<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Word Game</title>
    <!-- <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/game.css"> -->
</head>

<body class="bg-zinc-900 text-white min-h-screen">

    <!-- TOPBAR -->
    <header class="h-14 bg-black flex items-center justify-between px-4 shadow-lg">

        <!-- MENU BUTTON -->
        <button
            onclick="toggleMenu()"
            class="text-2xl"
        >
            ☰
        </button>

        <!-- LOGO -->
        <a
            href="../index.html"
            class="text-xl font-bold tracking-wide"
        >
            Енигматика
        </a>

        <!-- ABOUT -->
        <a
            href="../onama.html"
            class="text-sm opacity-80"
        >
            О нама
        </a>

    </header>

    <!-- SIDEBAR -->
    <aside
        id="sidebar"
        class="
            fixed
            top-0
            left-[-260px]
            w-64
            h-full
            bg-zinc-800
            transition-all
            duration-300
            z-50
            p-4
        "
    >

        <h2 class="text-xl font-bold mb-4">
            Игре
        </h2>

        <nav class="flex flex-col gap-2">

            <a href="pogodi_rec.html" class="p-2 rounded hover:bg-zinc-700">
                Погоди реч
            </a>

            <a href="pogodi_grad.html" class="p-2 rounded hover:bg-zinc-700">
                Погоди град
            </a>

        </nav>

    </aside>

    <!-- MAIN CONTENT -->
    <main class="p-4 flex flex-col items-center">

        <h2 class="text-3xl font-bold mb-6">
            Погоди град
        </h2>

        <div class="w-full max-w-md rounded-2xl overflow-hidden shadow-lg mb-4">

            <img
                src="../images/novi-sad.jpg"
                class="w-full object-cover"
            >

        </div>

        <input
            type="text"
            placeholder="Унеси град..."
            class="
                w-full
                max-w-md
                p-3
                rounded-xl
                text-black
                text-center
                mb-4
            "
        >

        <button
            class="
                bg-blue-600
                hover:bg-blue-700
                px-6
                py-3
                rounded-xl
                font-bold
                transition
            "
        >
            Потврди
        </button>

    </main>

    <script src="../js/layout.js"></script>

</body>
